            // Utility functions
            pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; },
            randomInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; },
            
            // Generate postal code based on country format
            generatePostalCode(format) {
                if (!format) return '';
                return format.split('').map(char => {
                    if (char === '#') return this.randomInt(0, 9);
                    if (char === 'A') return String.fromCharCode(65 + this.randomInt(0, 25));
                    return char;
                }).join('');

            // Generate phone number based on country
            generatePhone(countryCode) {
                const country = this.countries[countryCode] || this.countries['US'];
                const digits = Array(10).fill(0).map(() => this.randomInt(0, 9)).join('');
                return `${country.phonePrefix}${digits.substring(0, 10)}`;
            },
            
            // Generate unique email
            generateEmail(firstName, lastName) {
                const styles = [
                    () => `${firstName.toLowerCase()}.${lastName.toLowerCase()}`,
                    () => `${firstName.toLowerCase()}${lastName.toLowerCase()}`,
                    () => `${firstName.toLowerCase()}_${lastName.toLowerCase()}`,
                    () => `${firstName.charAt(0).toLowerCase()}${lastName.toLowerCase()}`,
                    () => `${firstName.toLowerCase()}${lastName.charAt(0).toLowerCase()}`,
                    () => `${firstName.toLowerCase()}.${lastName.charAt(0).toLowerCase()}`
                ];
                const base = this.pick(styles)();
                // Remove special characters for email
                const cleanBase = base.replace(/[^a-z0-9._]/g, '');
                const suffix = this.randomInt(1, 9999);
                return `${cleanBase}${suffix}@${this.pick(this.domains)}`;
            },
            
            generatePerson() {
                const firstName = this.pick(this.firstNames);
                const lastName = this.pick(this.lastNames);
                const cityData = this.pick(this.cities);
                const country = this.countries[cityData.country];
                
                return {
                    firstName,
                    lastName,
                    email: this.generateEmail(firstName, lastName),
                    phone: this.generatePhone(cityData.country),
                    address: {
                        line1: `${this.randomInt(1, 9999)} ${this.pick(this.streets)}`,
                        line2: Math.random() > 0.7 ? `Apt ${this.randomInt(1, 999)}` : null,

            generateGroupName(arrivalDate) { 
                const familyNames = this.lastNames.slice(0, 20);
                const groupType = this.pick(this.groupNames);
                const uniqueId = this.randomInt(1000, 9999);
                const dateStr = arrivalDate || new Date().toISOString().slice(0, 10);
                
                if (groupType === 'Family Reunion') {
                    return `${this.pick(familyNames)} Family Reunion - ${dateStr} #${uniqueId}`;
                }
                return `${groupType} - ${dateStr} #${uniqueId}`; 
            },
            
            generateDates(timeUnitPeriod = 'Day', forceToday = false) {
                const startDate = new Date();
                let endDate, displayInfo;
                
                if (timeUnitPeriod === 'Hour') {
                    // Hourly booking: same day, random hours (e.g., 08:00-12:00, 14:00-18:00)
                    const daysAhead = forceToday ? 0 : this.randomInt(1, 30);
                    startDate.setDate(startDate.getDate() + daysAhead);
                    const startHour = this.pick([8, 9, 10, 11, 13, 14, 15, 16]);
                    const duration = this.randomInt(1, 4); // 1-4 hours
                    startDate.setHours(startHour, 0, 0, 0);
                    endDate = new Date(startDate);
                    endDate.setHours(startHour + duration, 0, 0, 0);
                    displayInfo = {
                        nights: duration,
                        unitLabel: duration === 1 ? 'hour' : 'hours',
                        startDisplay: `${startDate.toLocaleDateString()} ${startHour}:00`,
                        endDisplay: `${endDate.toLocaleDateString()} ${startHour + duration}:00`,
                        isToday: daysAhead === 0
                    };
                } else if (timeUnitPeriod === 'Month') {
                    // Monthly booking: spans multiple months (1-6 months)
                    const daysAhead = forceToday ? 0 : this.randomInt(1, 30);
                    startDate.setDate(startDate.getDate() + daysAhead);
                    if (!forceToday) startDate.setDate(1); // Start from 1st of month (unless today)
                    startDate.setHours(14, 0, 0, 0);
                    const months = this.randomInt(1, 6);
                    endDate = new Date(startDate);
                    endDate.setMonth(endDate.getMonth() + months);
                    endDate.setHours(10, 0, 0, 0);
                    displayInfo = {
                        nights: months,
                        unitLabel: months === 1 ? 'month' : 'months',
                        startDisplay: startDate.toLocaleDateString(),
                        endDisplay: endDate.toLocaleDateString(),
                        isToday: daysAhead === 0
                    };
                } else {
                    // Day (default): standard nightly booking (1-7 nights)
                    // 20% chance of TODAY arrival, otherwise 1-60 days ahead
                    const daysAhead = forceToday ? 0 : this.randomInt(1, 60);
                    const stayLength = this.randomInt(1, 7);
                    startDate.setDate(startDate.getDate() + daysAhead);
                    startDate.setHours(14, 0, 0, 0);
                    endDate = new Date(startDate);
                    endDate.setDate(endDate.getDate() + stayLength);
                    endDate.setHours(10, 0, 0, 0);
                    displayInfo = {
                        nights: stayLength,
                        unitLabel: stayLength === 1 ? 'night' : 'nights',
                        startDisplay: startDate.toLocaleDateString(),
                        endDisplay: endDate.toLocaleDateString(),
                        isToday: daysAhead === 0
                    };
                }
                
                return { 
                    startUtc: startDate.toISOString(), 
                    endUtc: endDate.toISOString(), 
                    ...displayInfo
                };
            }
        };

        const MewsAPI = {
            baseUrl: 'https://api.mews-demo.com',
            
            // Helper function to make a fetch request with timeout
            async fetchWithTimeout(url, options, timeoutMs) {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), timeoutMs);
                
                try {
                    const response = await fetch(url, {
                        ...options,
                        signal: controller.signal
                    });
                    clearTimeout(timeoutId);
                    return response;
                } catch (error) {
                    clearTimeout(timeoutId);
                    throw error;
                }
            },
            
            async request(endpoint, data, clientToken, accessToken, addLog) {
                const url = `${this.baseUrl}/api/connector/v1/${endpoint}`;
                const body = JSON.stringify({
                    ClientToken: clientToken,
                    AccessToken: accessToken,
                    Client: 'MewsReservationGenerator 6.1.0 (Custom Proxy)',
                    ...data
                });
                
                const requestOptions = {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: body
                };

                // Try direct connection first (unlikely to work due to CORS, but try anyway)
                try {
                    const response = await this.fetchWithTimeout(url, requestOptions, 10000);
                    if (response.ok) {
                        return response.status === 204 ? {} : await response.json();
                    }
                } catch (directError) {
                    // Expected to fail due to CORS - continue to proxy
                }
                
                // Use proxy - start with last working proxy
                const proxyName = lastWorkingProxy === 0 ? 'Custom Worker' : 'fallback proxy';
                if (addLog) addLog(`Using ${proxyName} for connection...`, 'info');
                
                const proxyErrors = [];
                
                // Try each proxy, starting with the last one that worked
                for (let attempt = 0; attempt < CORS_PROXIES.length; attempt++) {
                    const proxyIndex = (lastWorkingProxy + attempt) % CORS_PROXIES.length;
                    const proxy = CORS_PROXIES[proxyIndex];
                    const proxyName = proxyIndex === 0 ? 'Custom Worker' : `Fallback ${proxyIndex}`;
                    
                    try {
                        const proxyUrl = proxy + encodeURIComponent(url);
                        
                        // Longer timeout for proxies (30 seconds)
                        const response = await this.fetchWithTimeout(proxyUrl, requestOptions, 30000);
                        
                        if (response.ok) {
                            lastWorkingProxy = proxyIndex; // Remember this proxy worked
                            currentProxyIndex = proxyIndex;
                            const result = response.status === 204 ? {} : await response.json();
                            return result;
                        }
                        
                        // Non-OK response - get error details
                        const errorText = await response.text();
                        proxyErrors.push(`${proxyName}: HTTP ${response.status}`);
                        
                        // If it's a Mews API error (not proxy error), throw immediately
                        if (response.status >= 400 && response.status < 500) {
                            throw new Error(`API Error ${response.status}: ${errorText}`);
                        }
                    } catch (proxyError) {
                        if (proxyError.message.includes('API Error')) {
                            throw proxyError; // Re-throw Mews API errors
                        }
                        proxyErrors.push(`${proxyName}: ${proxyError.name === 'AbortError' ? 'Timeout' : proxyError.message}`);
                    }
                    
                    // Small delay before trying next proxy
                    if (attempt < CORS_PROXIES.length - 1) {
                        await new Promise(resolve => setTimeout(resolve, 500));
                    }
                }
                
                // All proxies failed
                throw new Error(`Connection failed (tried ${CORS_PROXIES.length} proxies): ${proxyErrors.join(', ')}`);
            },

            getConfiguration: (ct, at, log) => MewsAPI.request('configuration/get', {}, ct, at, log),

                setLogs(prev => [...prev.slice(-100), { timestamp: new Date().toLocaleTimeString(), message, type }]);
            }, []);

            useEffect(() => { if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight; }, [logs]);

            const connectAndFetchServices = async () => {
                if (!clientToken || !accessToken) { addLog('Please enter both tokens', 'error'); return; }
                setStatus('connecting');
                addLog('Connecting to Mews API...', 'info');
                
                try {
                    addLog('Step 1/2: Fetching enterprise configuration...', 'info');
                    const config = await MewsAPI.getConfiguration(clientToken, accessToken, addLog);
                    // Store enterprise info including currency
                    const enterprise = config.Enterprise || {};
                    enterprise.DefaultCurrency = enterprise.DefaultCurrencyCode || config.Currencies?.[0]?.Code || 'EUR';
                    enterprise.TaxEnvironmentCode = config.TaxEnvironment?.Code || null;
                    setEnterpriseInfo(enterprise);
                    addLog(`✓ Connected to: ${enterprise?.Name || 'Unknown'} (Currency: ${enterprise.DefaultCurrency})`, 'success');

                    addLog('Step 2/2: Fetching bookable services...', 'info');
                    const servicesRes = await MewsAPI.getServices(clientToken, accessToken, addLog);
                    const services = servicesRes.Services || [];
                    
                    // Store raw response for debugging
                    setRawApiResponse(services);
                    
                    // Filter only active Bookable services (where Data.Discriminator === 'Bookable' AND IsActive === true)
                    const bookable = [];
                    for (let i = 0; i < services.length; i++) {
                        const svc = services[i];
                        const discriminator = svc.Data && svc.Data.Discriminator ? svc.Data.Discriminator : 'unknown';
                        const isActive = svc.IsActive === true;
                        const timeUnitPeriod = svc.Data?.Value?.TimeUnitPeriod || 'Day';
                        const isBookable = discriminator === 'Bookable' && isActive;
                        addLog(`  [${i+1}] ${svc.Name}: Discriminator="${discriminator}", IsActive=${isActive}, TimeUnit=${timeUnitPeriod}`, isBookable ? 'success' : 'warn');
                        if (isBookable) {
                            // Add TimeUnitPeriod to service object for later use
                            svc.TimeUnitPeriod = timeUnitPeriod;
                            bookable.push(svc);
                        }
                    }
                    addLog(`Filtered: ${bookable.length} of ${services.length} services are active & Bookable`, 'info');
                    
                    if (bookable.length === 0) {
                        throw new Error('No bookable services found in this enterprise');
                    }
                    
                    setBookableServices(bookable);
                    addLog(`✓ Found ${bookable.length} bookable service(s): ${bookable.map(s => s.Name).join(', ')}`, 'success');
                    
                    if (bookable.length === 1) {
                        setSelectedServiceId(bookable[0].Id);
                        addLog(`Auto-selected service: ${bookable[0].Name}`, 'info');
                        await loadServiceDetails(bookable[0].Id, bookable[0].Name);
                    }
                    
                    setStatus('connected');
                    setCurrentStep(2);
                    
                } catch (error) { 
                    setStatus('error'); 
                    addLog(`❌ Error: ${error.message}`, 'error');
                }
            };

            const loadServiceDetails = async (serviceId, serviceName) => {
                setIsLoadingService(true);
                setProducts([]);
                addLog(`Loading details for: ${serviceName}...`, 'info');
                
                try {
                    const [categoriesRes, ratesRes, ageCategoriesRes, productsRes] = await Promise.all([
                        MewsAPI.getResourceCategories(clientToken, accessToken, serviceId, addLog),
                        MewsAPI.getRates(clientToken, accessToken, serviceId, addLog),
                        MewsAPI.getAgeCategories(clientToken, accessToken, serviceId, addLog),
                        MewsAPI.getProducts(clientToken, accessToken, serviceId, addLog)
                    ]);
                    
                    const categories = categoriesRes.ResourceCategories || [];
                    const apiRates = ratesRes.Rates || [];
                    const ageCategories = ageCategoriesRes.AgeCategories || [];
                    const serviceProducts = productsRes.Products || [];
                    
                    // Filter active products only
                    const activeProducts = serviceProducts.filter(p => p.IsActive === true);
                    setProducts(activeProducts);
                    if (activeProducts.length > 0) {
                        addLog(`✓ Found ${activeProducts.length} active product(s) for random assignment`, 'success');
                    } else {
                        addLog(`ℹ No active products found for this service`, 'info');
                    }
                    
                    // Get ALL active and enabled rates for random selection
                    const activeRates = apiRates.filter(r => r.IsActive && r.IsEnabled);
                    const publicRate = activeRates.find(r => r.IsPublic) || activeRates[0] || apiRates[0];
                    const adultCategory = ageCategories.find(c => c.Classification === 'Adult') || ageCategories.find(c => c.MinimalAge >= 18) || ageCategories[0];

                    if (!categories.length) throw new Error('No room categories found for this service');
                    if (!publicRate) throw new Error('No rates found for this service');
                    if (!adultCategory) throw new Error('No age categories found for this service');

                    const selectedService = bookableServices.find(s => s.Id === serviceId) || { Id: serviceId, Name: serviceName };
                    const timeUnitPeriod = selectedService.TimeUnitPeriod || 'Day';
                    
                    // Log available rates
                    const rateNames = activeRates.map(r => r.Names?.['en-US'] || r.Name || 'Unnamed').join(', ');
                    addLog(`✓ Found ${activeRates.length} active rate(s): ${rateNames}`, 'success');
                    
                    setServiceData({ 
                        service: selectedService, 
                        categories, 
                        rate: publicRate,
                        rates: activeRates, // Store ALL rates for random selection
                        ageCategories, 
                        adultCategory,
                        timeUnitPeriod,
                        products: activeProducts
                    });
                    addLog(`✓ Loaded: ${categories.length} room types, TimeUnit: ${timeUnitPeriod}`, 'success');
                    
                } catch (error) {
                    addLog(`❌ Error loading service: ${error.message}`, 'error');
                    setServiceData(null);
                }
                
                setIsLoadingService(false);
            };

            const handleServiceSelect = async (serviceId) => {
                setSelectedServiceId(serviceId);
                setServiceData(null);
                const service = bookableServices.find(s => s.Id === serviceId);
                if (service) {
                    await loadServiceDetails(serviceId, service.Name);
                }
            };

            const disconnect = () => {
                setStatus('disconnected');
                setCurrentStep(1);
                setEnterpriseInfo(null);
                setBookableServices([]);
                setSelectedServiceId('');
                setServiceData(null);
                setProducts([]);
                setReservations([]);
                setProgress(0);
                setRawApiResponse(null);
                addLog('Disconnected', 'info');
            };

            const canGenerate = status === 'connected' && serviceData && selectedServiceId && !isGenerating && !isLoadingService;

            // Helper function to create a single reservation with retry logic
            const createSingleReservation = async (index, isGroupReservation, groupState, serviceInfo, totalReservations, enterpriseCurrency) => {
                const { service, categories, rates, adultCategory, timeUnitPeriod, products: availableProducts } = serviceInfo;
                const maxRetries = 4;
                const retryDelays = [3000, 5000, 8000, 12000];
                
                for (let attempt = 1; attempt <= maxRetries; attempt++) {
                    try {
                        const personData = RandomData.generatePerson();
                        const reservationNote = RandomData.generateReservationNote();
                        
                        // First 20% of reservations get TODAY as check-in date for testing
                        const forceToday = index < Math.ceil(totalReservations * 0.2);
                        
                        // Select a RANDOM rate from available rates
                        const selectedRate = RandomData.pick(rates);
                        const rateName = selectedRate.Names?.['en-US'] || selectedRate.Name || 'Unknown Rate';
                        
                        // For group reservations, use shared dates; for individual, generate new dates
                        let dates;
                        if (isGroupReservation && groupState.currentGroupId && groupState.groupDates) {
                            dates = groupState.groupDates;
                        } else {
                            dates = RandomData.generateDates(timeUnitPeriod, forceToday);
                        }
                        
                        if (attempt > 1) {
                            addLog(`  🔄 Retry ${attempt}/${maxRetries} for reservation ${index + 1}...`, 'warn');
                            await new Promise(resolve => setTimeout(resolve, 1500));
                        }
                        
                        // Step 1: Create Customer
                        let customer;
                        try {
                            const customerRes = await MewsAPI.createCustomer(clientToken, accessToken, personData, addLog);
                            
                            if (customerRes.Customer) {
                                customer = customerRes.Customer;
                            } else if (customerRes.Customers && customerRes.Customers.length > 0) {
                                customer = customerRes.Customers[0];
                            } else if (customerRes.Id) {
                                customer = customerRes;
                            } else {
                                addLog(`⚠ Unexpected customer response format: ${JSON.stringify(customerRes).substring(0, 200)}`, 'warn');
                                throw new Error('Unexpected API response format');
                            }
                            
                            if (!customer || !customer.Id) {
                                addLog(`⚠ Customer object missing ID: ${JSON.stringify(customer).substring(0, 200)}`, 'warn');
                                throw new Error('Customer created but no ID returned');
                            }
                        } catch (custError) {
                            throw new Error(`Failed to create customer: ${custError.message}`);
                        }

                        const category = RandomData.pick(categories);
                        const adultCount = RandomData.randomInt(1, 2);
                        const personCounts = [{ AgeCategoryId: adultCategory.Id, Count: adultCount }];
                        
                        let groupName = null, groupId = null, isNewGroup = false;
                        if (isGroupReservation) {
                            if (!groupState.currentGroupId || groupState.groupMemberCount >= groupState.targetGroupSize) {
                                dates = RandomData.generateDates(timeUnitPeriod, forceToday);
                                groupState.groupDates = dates;
                                groupState.currentGroupName = RandomData.generateGroupName(dates.startDisplay); 
                                groupState.currentGroupId = null; 
                                groupState.groupMemberCount = 0; 
                                groupState.targetGroupSize = RandomData.randomInt(2, 5);
                                isNewGroup = true; 
                                groupName = groupState.currentGroupName;
                            } else { 
                                groupId = groupState.currentGroupId;
                                dates = groupState.groupDates;
                            }
                        }
                        
                        // Calculate price for display (estimated based on nights)
                        // We don't send pricing to API - Mews uses the Rate's configured prices
                        // This avoids TaxCodes requirement issues
                        const numTimeUnits = dates.nights || 1;
                        const estimatedPricePerNight = RandomData.randomInt(100, 300); // Just for display
                        const totalPrice = estimatedPricePerNight * numTimeUnits;
                        
                        const reservation = { 
                            Identifier: `RES-${index + 1}-${Date.now()}`, 
                            State: 'Confirmed', 
                            StartUtc: dates.startUtc, 
                            EndUtc: dates.endUtc, 
                            CustomerId: customer.Id, 
                            BookerId: customer.Id, 
                            RequestedCategoryId: category.Id, 
                            RateId: selectedRate.Id,
                            PersonCounts: personCounts, 
                            Notes: reservationNote
                            // NO TimeUnitAmount or TimeUnitPrices - Mews uses Rate's default pricing
                        };
                        
                        // Randomly assign products (50% chance to have products, then 1-3 random products)
                        let assignedProducts = [];
                        if (availableProducts && availableProducts.length > 0 && Math.random() > 0.5) {
                            const numProducts = RandomData.randomInt(1, Math.min(3, availableProducts.length));
                            const shuffled = [...availableProducts].sort(() => Math.random() - 0.5);
                            assignedProducts = shuffled.slice(0, numProducts);
                            reservation.ProductOrders = assignedProducts.map(p => ({
                                ProductId: p.Id,
                                Count: 1
                            }));
                        }
                        
                        // Step 2: Create Reservation
                        let result, resData;
                        try {
                            result = await MewsAPI.addReservations(clientToken, accessToken, service.Id, [reservation], groupName, groupId, addLog);
                            resData = result.Reservations?.[0]?.Reservation || {};
                            
                            // Validate that reservation was actually created
                            if (!resData.Id && !resData.Number) {
                                throw new Error('Reservation response missing ID and Number - may not have been created');
                            }
                        } catch (resError) {
                            throw new Error(`Failed to create reservation: ${resError.message}`);
                        }
                        
                        if (isGroupReservation && isNewGroup && resData.GroupId) groupState.currentGroupId = resData.GroupId;
                        if (isGroupReservation) groupState.groupMemberCount++;
                        
                        const productNames = assignedProducts.map(p => p.Names?.['en-US'] || p.Name || 'Product').join(', ');
                        const productInfo = assignedProducts.length > 0 ? ` +${assignedProducts.length} product(s)` : '';
                        const todayBadge = dates.isToday ? ' 📅TODAY' : '';
                        const priceInfo = ` | Rate: ${rateName}`;
                        
                        if (attempt > 1) {
                            addLog(`  ✓ Retry successful!`, 'success');
                        }
                        addLog(`✓ #${resData.Number || (index + 1)} - ${personData.firstName} ${personData.lastName} (${dates.nights} ${dates.unitLabel})${priceInfo}${productInfo}${todayBadge}`, 'success');
                        
                        return { 
                            success: true,
                            data: {
                                index: index + 1, 
                                confirmationNumber: resData.Number || 'N/A', 
                                customer: `${personData.firstName} ${personData.lastName}`, 
                                email: personData.email, 
                                address: `${personData.address.line1}, ${personData.address.city}, ${personData.address.countryCode}`, 
                                category: category.Names?.['en-US'] || category.Name || 'Room', 
                                checkIn: dates.startDisplay, 
                                checkOut: dates.endDisplay, 
                                duration: `${dates.nights} ${dates.unitLabel}`,
                                totalPrice: `Rate: ${rateName}`,
                                rateName: rateName,
                                isToday: dates.isToday,
                                guests: adultCount, 
                                profileNote: personData.notes, 
                                reservationNote, 
                                isGroup: isGroupReservation, 
                                groupName: isGroupReservation ? groupState.currentGroupName : null,
                                products: productNames || null,
                                status: 'success',
                                retryCount: attempt - 1
                            }
                        };
                        
                    } catch (error) {
                        // Retry on ANY error, not just network errors
                        if (attempt < maxRetries) {
                            addLog(`⚠ Error on reservation ${index + 1} (attempt ${attempt}/${maxRetries}): ${error.message}`, 'warn');
                            addLog(`  Waiting ${retryDelays[attempt - 1] / 1000}s before retry...`, 'info');
                            await new Promise(resolve => setTimeout(resolve, retryDelays[attempt - 1]));
                            continue; // Try again with new customer data
                        }
                        
                        // All retries exhausted
                        addLog(`✗ Reservation ${index + 1} failed after ${maxRetries} attempts: ${error.message}`, 'error');
                        
                        return {
                            success: false,
                            data: { index: index + 1, error: error.message, isGroup: isGroupReservation, status: 'error' }
                        };
                    }
                }
            };

            const generateReservations = async () => {
                if (!serviceData) { addLog('Error: No service data available', 'error'); return; }
                
                setIsGenerating(true); 
                setReservations([]); 
                setProgress(0); 
                setCurrentStep(3);
                
                const { service, categories, rates, adultCategory, timeUnitPeriod, products: availableProducts } = serviceData;
                const enterpriseCurrency = enterpriseInfo?.DefaultCurrency || 'EUR';
                const groupCount = Math.round(reservationCount * (groupPercentage / 100));
                const reservationTypes = [...Array(groupCount).fill('group'), ...Array(reservationCount - groupCount).fill('individual')].sort(() => Math.random() - 0.5);
                
                const todayCount = Math.ceil(reservationCount * 0.2);
                const timeUnitLabel = timeUnitPeriod === 'Hour' ? 'hourly' : timeUnitPeriod === 'Month' ? 'monthly' : 'nightly';
                const rateNames = rates.map(r => r.Names?.['en-US'] || r.Name || 'Unnamed').slice(0, 3).join(', ');
                
                addLog(`Creating ${reservationCount} ${timeUnitLabel} reservations in "${service.Name}"`, 'info');
                addLog(`📊 Mix: ${groupCount} group, ${reservationCount - groupCount} individual, ${todayCount} with TODAY check-in`, 'info');
                addLog(`💰 Pricing: 100-500 ${enterpriseCurrency}/night (weekends +20%), random rates`, 'info');
                addLog(`🎯 Available rates (${rates.length}): ${rateNames}${rates.length > 3 ? '...' : ''}`, 'info');
                addLog(`🔄 Auto-retry: up to 4 attempts per reservation (30s timeout)`, 'info');
                if (availableProducts && availableProducts.length > 0) {
                    addLog(`📦 Products will be randomly assigned from ${availableProducts.length} available`, 'info');
                }
                
                // Group state object (mutable, passed by reference)
                const groupState = {
                    currentGroupId: null,
                    currentGroupName: null,
                    groupMemberCount: 0,
                    targetGroupSize: 0,
                    groupDates: null
                };
                
                let successCount = 0;
                let totalRetries = 0;

                for (let i = 0; i < reservationCount; i++) {
                    const isGroupReservation = reservationTypes[i] === 'group';
                    
                    const result = await createSingleReservation(i, isGroupReservation, groupState, serviceData, reservationCount, enterpriseCurrency);
                    
                    if (result.success) {
                        successCount++;
                        if (result.data.retryCount > 0) {
                            totalRetries += result.data.retryCount;
                        }
                    }
                    
                    setReservations(prev => [...prev, result.data]);
                    setProgress(((i + 1) / reservationCount) * 100);
                    
                    // Add delay between requests to avoid rate limiting (3 seconds)
                    await new Promise(resolve => setTimeout(resolve, 3000));
                }
                
                if (totalRetries > 0) {
                    addLog(`🎉 Generation complete! ${successCount}/${reservationCount} successful (${totalRetries} retries needed)`, 'success');
                } else {
                    addLog(`🎉 Generation complete! ${successCount}/${reservationCount} successful`, 'success');
                }
                setIsGenerating(false);
            };

            const resetGenerator = () => { setReservations([]); setProgress(0); setCurrentStep(2); };
            
            const successCount = reservations.filter(r => r.status === 'success').length;
            const groupCountResult = reservations.filter(r => r.status === 'success' && r.isGroup).length;
            const individualCount = reservations.filter(r => r.status === 'success' && !r.isGroup).length;

            return (
                <div className="app-container">
                    <header className="header">
                        <div className="logo"><div className="logo-icon">🏨</div><span className="logo-text">Mews Reservation Generator</span></div>
                        <p className="header-subtitle">Create randomized test reservations with realistic guest data from 40+ countries (7.5M+ unique combinations)</p>
                    </header>
                    <div className="main-grid">
                        <div className="card">
                            <div className="card-header"><div className="card-header-icon">⚙️</div><h2 className="card-title">Configuration</h2></div>
                            <div className="card-body">
                                <div className="step-indicator">
                                    <div className={`step ${currentStep >= 1 ? (currentStep > 1 ? 'completed' : 'active') : ''}`}><div className="step-number">{currentStep > 1 ? '✓' : '1'}</div><span className="step-label">Connect</span></div>
                                    <div className={`step-divider ${currentStep > 1 ? 'completed' : ''}`}></div>
                                    <div className={`step ${currentStep >= 2 ? (currentStep > 2 ? 'completed' : 'active') : ''}`}><div className="step-number">{currentStep > 2 ? '✓' : '2'}</div><span className="step-label">Configure</span></div>
                                    <div className={`step-divider ${currentStep > 2 ? 'completed' : ''}`}></div>
                                    <div className={`step ${currentStep >= 3 ? 'active' : ''}`}><div className="step-number">3</div><span className="step-label">Generate</span></div>
                                </div>
                                
                                <div className="status-bar">
                                    <div className={`status-dot ${status === 'connected' ? 'connected' : status === 'error' ? 'error' : status === 'connecting' ? 'connecting' : ''}`}></div>
                                    <span className="status-text">{status === 'connected' ? '✓ Connected' : status === 'connecting' ? 'Connecting...' : status === 'error' ? '✗ Connection failed' : 'Not connected'}</span>
                                    {status === 'connected' && <button onClick={disconnect} style={{background:'none',border:'none',color:'var(--text-muted)',cursor:'pointer',fontSize:'12px'}}>Disconnect</button>}
                                </div>
                                
                                {enterpriseInfo && (
                                    <div className="enterprise-info">
                                        <div className="enterprise-info-title">✓ Enterprise Connected</div>
                                        <div className="enterprise-info-item"><span className="enterprise-info-label">Name:</span><span className="enterprise-info-value">{enterpriseInfo.Name}</span></div>
                                        <div className="enterprise-info-item"><span className="enterprise-info-label">Timezone:</span><span className="enterprise-info-value">{enterpriseInfo.TimeZoneIdentifier}</span></div>
                                        <div className="enterprise-info-item"><span className="enterprise-info-label">Environment:</span><span className="enterprise-info-value">{enterpriseInfo.LegalEnvironmentCode}</span></div>
                                    </div>
                                )}
                                
                                <div className="form-group">
                                    <label className="form-label">Access Token</label>
                                    <input type="text" className="form-input" placeholder="Enter your Access Token" value={accessToken} onChange={(e) => setAccessToken(e.target.value)} disabled={status === 'connected'} />
                                </div>
                                
                                {status !== 'connected' && (
                                    <button className="btn-primary" onClick={connectAndFetchServices} disabled={!accessToken || status === 'connecting'} style={{ marginBottom: '16px' }}>
                                        {status === 'connecting' ? <><span className="loading-spinner"></span>Connecting...</> : '🔌 Connect & Load Configuration'}
                                    </button>
                                )}
                                
                                {status === 'connected' && (
                                    <>
                                        {bookableServices.length >= 1 && (
                                            <div className="form-group">
                                                <label className="form-label">Select Bookable Service</label>
                                                <div className="service-grid">
                                                    {bookableServices.map(svc => (
                                                        <div key={svc.Id} className={`service-option ${selectedServiceId === svc.Id ? 'selected' : ''}`} onClick={() => handleServiceSelect(svc.Id)}>
                                                            <div className="service-icon">{svc.TimeUnitPeriod === 'Hour' ? '⏰' : svc.TimeUnitPeriod === 'Month' ? '📅' : '🏨'}</div>
                                                            <div className="service-info">
                                                                <div className="service-name">{svc.Name}</div>
                                                                <div className="service-id">{svc.TimeUnitPeriod === 'Hour' ? 'Hourly' : svc.TimeUnitPeriod === 'Month' ? 'Monthly' : 'Nightly'} booking</div>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                        
                                        {isLoadingService && (
                                            <div style={{textAlign:'center',padding:'20px',color:'var(--text-muted)'}}>
                                                <span className="loading-spinner" style={{borderColor:'var(--accent-primary)',borderTopColor:'var(--accent-secondary)'}}></span>
                                                Loading service details...
                                            </div>
                                        )}
                                        
                                        {serviceData && (
                                            <>
                                                <div className="form-group">
                                                    <label className="form-label">Number of Reservations (max 40)</label>
                                                    <div className="number-input-wrapper">
                                                        <button className="number-btn" onClick={() => setReservationCount(Math.max(1, reservationCount - 1))} disabled={isGenerating}>−</button>
                                                        <div className="number-display">{reservationCount}</div>
                                                        <button className="number-btn" onClick={() => setReservationCount(Math.min(40, reservationCount + 1))} disabled={isGenerating}>+</button>
                                                    </div>
                                                </div>
                                                
                                                <div className="form-group">
                                                    <label className="form-label">Group vs Individual Mix</label>
                                                    <div className="slider-container">
                                                        <div className="slider-label"><span>Individual: {100 - groupPercentage}%</span><span>Group: {groupPercentage}%</span></div>
                                                        <input type="range" className="slider" min="0" max="100" step="10" value={groupPercentage} onChange={(e) => setGroupPercentage(parseInt(e.target.value))} disabled={isGenerating} />
                                                    </div>
                                                </div>
                                                
                                                <div className="debug-info">
                                                    <div className="debug-info-title">🔍 Ready Check:</div>
                                                    <div className={`debug-item ${selectedServiceId ? 'ok' : 'missing'}`}>{selectedServiceId ? '✓' : '✗'} Service: {serviceData?.service?.Name || 'none'} ({serviceData?.timeUnitPeriod || 'Day'})</div>
                                                    <div className={`debug-item ${serviceData ? 'ok' : 'missing'}`}>{serviceData ? '✓' : '✗'} Service data loaded</div>
                                                    <div className={`debug-item ${serviceData?.categories?.length ? 'ok' : 'missing'}`}>{serviceData?.categories?.length ? '✓' : '✗'} Room types: {serviceData?.categories?.length || 0}</div>
                                                    <div className={`debug-item ${serviceData?.rates?.length ? 'ok' : 'missing'}`}>{serviceData?.rates?.length ? '✓' : '✗'} Rates: {serviceData?.rates?.length || 0} (randomly selected)</div>
                                                    <div className={`debug-item ok`}>✓ Pricing: 100-500 {enterpriseInfo?.DefaultCurrency || 'EUR'}/night</div>
                                                    <div className={`debug-item ok`}>✓ Check-in: 20% TODAY, 80% future</div>
                                                </div>
                                                
                                                <button className="btn-primary" onClick={generateReservations} disabled={!canGenerate} style={{ marginTop: '16px', marginBottom: reservations.length > 0 && !isGenerating ? '12px' : '0' }}>
                                                    {isGenerating ? <><span className="loading-spinner"></span>Generating...</> : '🚀 Generate Reservations'}
                                                </button>
                                                
                                                {reservations.length > 0 && !isGenerating && (
                                                    <button className="btn-secondary" onClick={resetGenerator}>🔄 Reset & Generate More</button>
                                                )}
                                            </>
                                        )}
                                        
                                        {!serviceData && !isLoadingService && bookableServices.length >= 1 && !selectedServiceId && (
                                            <div style={{textAlign:'center',padding:'20px',color:'var(--text-muted)',fontSize:'13px'}}>
                                                👆 Please select a bookable service above
                                            </div>
                                        )}
                                    </>
                                )}
                                
                                {logs.length > 0 && (
                                    <div className="log-panel" ref={logRef}>
                                        {logs.map((log, i) => (
                                            <div key={i} className={`log-entry ${log.type}`}>[{log.timestamp}] {log.message}</div>
                                        ))}
                                    </div>
                                )}
                                
                                {rawApiResponse && (
                                    <div className="api-debug-panel">
                                        <div className="api-debug-header" onClick={() => setShowApiDebug(!showApiDebug)}>
                                            <span className="api-debug-title">🔧 API Response Debug ({rawApiResponse.length} services)</span>
                                            <span className="api-debug-toggle">{showApiDebug ? '▼ Hide' : '▶ Show'}</span>
                                        </div>
                                        {showApiDebug && (
                                            <div className="api-debug-content">
                                                {JSON.stringify(rawApiResponse, null, 2)}
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        </div>
                        
                        <div className="card results-panel">
                            <div className="card-header"><div className="card-header-icon">📋</div><h2 className="card-title">Generated Reservations</h2></div>
                            {isGenerating && (
                                <div className="progress-container">
                                    <div className="progress-text"><span>Creating reservations...</span><span>{Math.round(progress)}%</span></div>
                                    <div className="progress-bar"><div className="progress-fill" style={{ width: `${progress}%` }}></div></div>
                                </div>
                            )}
                            {reservations.length === 0 && !isGenerating ? (
                                <div className="results-empty">
                                    <div className="results-empty-icon">📝</div>
                                    <h3 className="results-empty-title">No Reservations Yet</h3>
                                    <p className="results-empty-text">Connect to your Mews environment, select a service, and click "Generate Reservations"</p>
                                </div>
                            ) : (
                                <>
                                    {reservations.length > 0 && (
                                        <div className="summary-stats">
                                            <div className="stat-item"><div className="stat-value">{reservations.length}</div><div className="stat-label">Total</div></div>
                                            <div className="stat-item"><div className="stat-value success">{successCount}</div><div className="stat-label">Success</div></div>
                                            <div className="stat-item"><div className="stat-value group">{groupCountResult}</div><div className="stat-label">Group</div></div>
                                            <div className="stat-item"><div className="stat-value" style={{ color: 'var(--accent-primary)' }}>{individualCount}</div><div className="stat-label">Individual</div></div>
                                        </div>
                                    )}
                                    <div className="reservation-list">
                                        {reservations.map((res, i) => (
                                            <div key={i} className={`reservation-item ${res.status} ${res.isGroup ? 'group' : ''}`}>
                                                <div className="reservation-header">
                                                    <span className="reservation-number">{res.status === 'success' ? `#${res.confirmationNumber}` : `Reservation ${res.index}`}</span>
                                                    <div className="reservation-badges">
                                                        {res.isToday && <span className="reservation-badge" style={{background:'rgba(16, 185, 129, 0.2)',color:'#10b981'}}>📅 TODAY</span>}
                                                        <span className={`reservation-badge ${res.isGroup ? 'group' : 'individual'}`}>{res.isGroup ? 'Group' : 'Individual'}</span>
                                                        {res.retryCount > 0 && <span className="reservation-badge retry">🔄 {res.retryCount} retry</span>}
                                                        <span className={`reservation-badge ${res.status}`}>{res.status === 'success' ? '✓ Created' : '✗ Failed'}</span>
                                                    </div>
                                                </div>
                                                {res.status === 'success' ? (
                                                    <>
                                                        <div className="reservation-details">
                                                            <div className="reservation-detail"><span className="reservation-detail-label">Guest:</span><span className="reservation-detail-value">{res.customer}</span></div>
                                                            <div className="reservation-detail"><span className="reservation-detail-label">Email:</span><span className="reservation-detail-value">{res.email}</span></div>
                                                            <div className="reservation-detail"><span className="reservation-detail-label">Room:</span><span className="reservation-detail-value">{res.category}</span></div>
                                                            <div className="reservation-detail"><span className="reservation-detail-label">Rate:</span><span className="reservation-detail-value" style={{color:'var(--accent-secondary)'}}>{res.rateName}</span></div>
                                                            <div className="reservation-detail"><span className="reservation-detail-label">Duration:</span><span className="reservation-detail-value">{res.duration}</span></div>
                                                            <div className="reservation-detail"><span className="reservation-detail-label">Total Price:</span><span className="reservation-detail-value" style={{fontWeight:'600',color:'var(--success)'}}>{res.totalPrice}</span></div>
                                                            <div className="reservation-detail"><span className="reservation-detail-label">Check-in:</span><span className="reservation-detail-value">{res.checkIn}{res.isToday ? ' (TODAY)' : ''}</span></div>
                                                            <div className="reservation-detail"><span className="reservation-detail-label">Check-out:</span><span className="reservation-detail-value">{res.checkOut}</span></div>
                                                        </div>
                                                        {res.products && <div className="group-info" style={{background:'rgba(16, 185, 129, 0.05)'}}><div className="group-info-title" style={{color:'var(--success)'}}>📦 Products</div><div className="group-info-text">{res.products}</div></div>}
                                                        {res.isGroup && res.groupName && <div className="group-info"><div className="group-info-title">👥 Group</div><div className="group-info-text">{res.groupName}</div></div>}
                                                        {(res.profileNote || res.reservationNote) && (
                                                            <div className="reservation-notes">
                                                                {res.profileNote && <><div className="reservation-notes-title">Profile Note</div><div className="reservation-notes-text">{res.profileNote}</div></>}
                                                                {res.reservationNote && <><div className="reservation-notes-title" style={{marginTop: res.profileNote ? '8px' : '0'}}>Reservation Note</div><div className="reservation-notes-text">{res.reservationNote}</div></>}
                                                            </div>
                                                        )}
                                                    </>
                                                ) : (
                                                    <div className="reservation-detail"><span className="reservation-detail-label">Error:</span><span className="reservation-detail-value">{res.error}</span></div>
                                                )}}
                                            </div>
                                        ))}
                                    </div>
                                </>
                            )}
                        </div>
                    </div>
                </div>
            );
        }
        
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
